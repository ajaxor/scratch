<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Relic Rooms</title>
<style>
  :root{--bg:#07140d;--dark:#14301f;--mid:#2e6b3f;--light:#b7f07a;--hot:#f7d36b;--bad:#ff6b5f;--tile:min(7.5vw,7.5vh,34px)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--light);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  body{display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 8px env(safe-area-inset-bottom)}
  #game{width:min(100vw,980px);height:100%;max-height:720px;display:grid;grid-template-rows:auto 1fr auto auto;gap:8px}
  header{display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;line-height:1.25}
  .panel{border:3px solid var(--mid);background:#091b10;box-shadow:0 0 0 2px #000 inset;padding:6px}
  #viewWrap{display:flex;align-items:center;justify-content:center;min-height:0}
  #view{position:relative;width:calc(var(--tile) * 13);height:calc(var(--tile) * 9);background:var(--dark);border:4px solid var(--light);box-shadow:0 0 0 4px #000,0 0 28px rgba(183,240,122,.25);overflow:hidden}
  #map,#actors{position:absolute;inset:0;display:grid;grid-template-columns:repeat(13,1fr);grid-template-rows:repeat(9,1fr);width:100%;height:100%}
  #actors{z-index:5;pointer-events:none}
  .tile{display:flex;align-items:center;justify-content:center;font-weight:900;font-size:calc(var(--tile)*.5);line-height:1;color:var(--light);background:var(--dark)}
  .floor{background:#102719}.wall{background:#061008}.door{background:#70481f;color:var(--hot)}.vine{background:#112b16;color:var(--light)}.crack{background:#1c2618;color:#89bf5f}.anchor{background:#183628;color:#7ed3ff}.seal{background:#201434;color:#d49cff}.hidden{background:#102719;color:#102719}
  .sprite{display:flex;align-items:center;justify-content:center;font-weight:900;font-size:calc(var(--tile)*.68);line-height:1;color:var(--hot);text-shadow:0 2px #000;z-index:4}
  .player{color:var(--hot);font-size:calc(var(--tile)*.78);filter:drop-shadow(0 0 3px var(--hot));z-index:10}
  .enemy{color:var(--bad);z-index:6}.item{color:var(--hot);z-index:5}.bolt{color:#bdf;z-index:9}
  .msg{min-height:38px;font-size:12px;line-height:1.25}.hud{display:flex;gap:8px;flex-wrap:wrap}.chip{border:2px solid var(--mid);padding:3px 5px;background:#061008}.equipped{border-color:var(--hot);color:var(--hot)}
  #controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center}.pad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:6px;justify-content:center}.buttons{display:grid;grid-template-columns:78px 78px;gap:8px;justify-content:center}
  .btn{border:3px solid var(--light);background:#12331d;color:var(--light);font:700 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;border-radius:10px;display:flex;align-items:center;justify-content:center;min-height:54px}.btn:active,.btn.down{background:var(--light);color:#061008}.blank{visibility:hidden}
  @media (orientation:landscape) and (max-height:560px){#game{grid-template-columns:1fr auto;grid-template-rows:auto 1fr auto}header{grid-column:1/3}#controls{grid-column:2;grid-row:2;grid-template-columns:1fr}.msg{grid-column:1/3}.pad{grid-template-columns:48px 48px 48px;grid-template-rows:48px 48px 48px}.buttons{grid-template-columns:68px 68px}.btn{min-height:46px}}
</style>
</head>
<body>
<div id="game">
<header class="panel"><div><b>RELIC ROOMS</b> <span id="roomName"></span></div><div id="status">♥♥♥</div></header>
<div id="viewWrap"><div id="view"><div id="map"></div><div id="actors"></div></div></div>
<div id="controls" class="panel">
  <div class="pad">
    <div class="blank btn"></div><button class="btn" data-dir="up">▲</button><div class="blank btn"></div>
    <button class="btn" data-dir="left">◀</button><button class="btn" id="wait">•</button><button class="btn" data-dir="right">▶</button>
    <div class="blank btn"></div><button class="btn" data-dir="down">▼</button><div class="blank btn"></div>
  </div>
  <div class="buttons"><button class="btn" id="act">TOOL</button><button class="btn" id="swap">SWAP</button><button class="btn" id="read">READ</button><button class="btn" id="reset">RESET</button></div>
</div>
<div class="panel"><div class="hud" id="inventory"></div><div class="msg" id="msg"></div></div>
</div>
<script>
(() => {
'use strict';
const W=13,H=9;
const rooms={
 '0,0':{name:'Green Court',map:['#############','#.....v.....#','#..i..v..e..#','#.....v.....D','#...........#','#..###.###..#','#..#.....#..#','#..#..s..#..#','#############'],items:[{x:3,y:2,id:'sword',icon:'†'}],sign:'A bronze door waits east. Vines yield to the blade.'},
 '1,0':{name:'Vine Gallery',map:['#############','D....v......#','#.###v###...#','#...v...#...#','#...v.i.#.e.#','#...v...#...#','#.#####.#...#','#.......#...#','#############'],items:[{x:6,y:4,id:'boots',icon:'≋'}],sign:'Swift boots cross cracked stone. Not every road is safe to walk.'},
 '2,0':{name:'Broken Hall',map:['#############','#.....c.....#','#.###ccc###.#','#...c...c...#','D...c.i.c...D','#...c...c...#','#.###ccc###.#','#.....c.....#','#############'],items:[{x:6,y:4,id:'lantern',icon:'¤'}],sign:'The lantern makes false walls confess.'},
 '3,0':{name:'Dark Archive',map:['#############','D....h......#','#.#######.#.#','#.#.....#.#.#','#.#.i...#.#.#','#.#.....#...#','#.#########.#','#.......s...#','#############'],items:[{x:4,y:4,id:'hook',icon:'⌁'}],sign:'Blue anchors answer the hook.'},
 '0,1':{name:'South Garden',map:['#############','#..e........#','#..###.###..#','#..#.....#..#','#..#.i...#..#','#..#.....#..#','#..###.###..#','#...........#','######D######'],items:[{x:5,y:4,id:'key',icon:'⚿'}],sign:'The key opens old bronze locks.'},
 '1,1':{name:'Mirror Pool',map:['#############','#.....a.....#','#.###...###.#','#...a.e.a...#','D...a.i.a...#','#...a...a...#','#.###...###.#','#.....a.....#','######D######'],items:[{x:6,y:4,id:'prism',icon:'◈'}],sign:'The prism turns enemy fire back on itself.'},
 '2,1':{name:'Seal Antechamber',map:['#############','#...........#','#.###.#.###.#','#.#...#...#.#','D.#.S...S.#.D','#.#...#...#.#','#.###.#.###.#','#...........#','######D######'],items:[],sign:'Two crown shards wake the violet seals.'},
 '3,1':{name:'Crown Vault',map:['#############','#..e........#','#..#####....#','#..#...#....#','D..#.i.#....#','#..#...#....#','#..#####....#','#...........#','#############'],items:[{x:5,y:4,id:'crown1',icon:'▲'}],sign:'A crown shard hums with the lock below.'},
 '2,2':{name:'Final Door',map:['######D######','#...........#','#.S.S.S.S.S.#','#...........#','#.....F.....#','#...........#','#.S.S.S.S.S.#','#...........#','#############'],items:[{x:6,y:4,id:'crown2',icon:'▲'}],sign:'When both crown shards are held, the final door opens.'}
};
const itemInfo={sword:{name:'Sword',desc:'cuts vines and strikes nearby enemies'},boots:{name:'Boots',desc:'dash over cracked floors'},lantern:{name:'Lantern',desc:'reveals hidden walls'},hook:{name:'Hook',desc:'pulls you across blue anchors'},key:{name:'Key',desc:'opens bronze locks'},prism:{name:'Prism',desc:'reflects enemy bolts'},crown1:{name:'Crown Shard',desc:'one half of the final seal'},crown2:{name:'Crown Shard',desc:'one half of the final seal'}};
let state, lastTap=0;
const el={map:document.getElementById('map'),actors:document.getElementById('actors'),inv:document.getElementById('inventory'),msg:document.getElementById('msg'),roomName:document.getElementById('roomName'),status:document.getElementById('status')};
function reset(){state={room:'0,0',x:1,y:4,hp:3,inventory:[],equipped:null,seenHidden:{},enemies:{},bolts:[]}; for(const k in rooms){state.enemies[k]=[]; const m=rooms[k].map; for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(m[y][x]=='e')state.enemies[k].push({x,y,hp:1,step:0});} msg('You are the gold face. Move around, find the sword, and read clues.'); render();}
function room(){return rooms[state.room]} function has(id){return state.inventory.includes(id)} function tile(x,y){if(x<0||y<0||x>=W||y>=H)return '#'; return room().map[y][x]}
function msg(t){el.msg.textContent=t}
function canEnter(x,y){let t=tile(x,y); if(t=='#')return false; if(t=='v')return has('sword'); if(t=='c')return has('boots'); if(t=='h')return has('lantern'); if(t=='a')return has('hook'); if(t=='S'||t=='F')return has('crown1')&&has('crown2'); return true}
function move(dx,dy){let nx=state.x+dx, ny=state.y+dy; if(nx<0||nx>=W||ny<0||ny>=H)return; const t=tile(nx,ny); if(t=='D'){door(dx,dy); return} if(!canEnter(nx,ny)){blocked(t); render(); return} state.x=nx; state.y=ny; pickup(); enemyAtPlayer(); tick(); render()}
function blocked(t){msg(t=='v'?'Vines block the path. Find the sword.':t=='c'?'Cracked floors need the boots.':t=='h'?'A false-dark wall. The lantern may reveal it.':t=='a'?'The blue anchor is too far without the hook.':t=='S'||t=='F'?'The seal needs both crown shards.':'Blocked by stone. Try another direction.')}
function door(dx,dy){let [rx,ry]=state.room.split(',').map(Number); let nr=(rx+dx)+','+(ry+dy); if(!rooms[nr]){msg('The way is sealed for now.'); render(); return} if(tile(state.x+dx,state.y+dy)=='D'&&!has('key')&&nr=='2,0'){msg('This bronze lock needs a key.'); render(); return} state.room=nr; if(dx>0)state.x=1;if(dx<0)state.x=W-2;if(dy>0)state.y=1;if(dy<0)state.y=H-2; msg(rooms[nr].sign); tick(); render()}
function pickup(){const r=room(); for(let i=r.items.length-1;i>=0;i--){const it=r.items[i]; if(it.x==state.x&&it.y==state.y&&!has(it.id)){state.inventory.push(it.id); if(!state.equipped)state.equipped=it.id; r.items.splice(i,1); msg('Found '+itemInfo[it.id].name+': '+itemInfo[it.id].desc+'.')}} if(tile(state.x,state.y)=='F'&&has('crown1')&&has('crown2'))msg('The relic crown is whole. You win — for now.')}
function action(){const eq=state.equipped; if(!eq){msg('No relic equipped yet. Find the sword.'); render(); return} if(eq=='sword'){let hit=false; for(const e of state.enemies[state.room])if(Math.abs(e.x-state.x)+Math.abs(e.y-state.y)==1){e.hp=0;hit=true} state.enemies[state.room]=state.enemies[state.room].filter(e=>e.hp>0); msg(hit?'The sword cuts true.':'You swing at empty air. Vines also part before the blade.')}
 else if(eq=='boots')msg('Boots ready: step onto cracked floors safely.')
 else if(eq=='lantern'){state.seenHidden[state.room]=true; msg('The lantern shows hidden passages.')}
 else if(eq=='hook'){for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){let x=state.x+dx,y=state.y+dy; while(x>0&&y>0&&x<W-1&&y<H-1){if(tile(x,y)=='a'){state.x=x;state.y=y;msg('The hook snaps to the blue anchor.');tick();render();return} if(tile(x,y)=='#')break; x+=dx;y+=dy}} msg('No anchor in line.')}
 else if(eq=='prism')msg('Prism raised. Enemy bolts will reflect if they touch you.')
 else msg('That relic is quiet.')
 tick(); render()}
function read(){msg(room().sign)} function swap(){if(!state.inventory.length){msg('No relics yet.');return} let i=state.inventory.indexOf(state.equipped); state.equipped=state.inventory[(i+1)%state.inventory.length]; msg('Equipped '+itemInfo[state.equipped].name+'.'); render()}
function tick(){const es=state.enemies[state.room]; for(const e of es){e.step++; if(e.step%2==0){const dx=Math.sign(state.x-e.x),dy=Math.sign(state.y-e.y); const opts=Math.abs(state.x-e.x)>Math.abs(state.y-e.y)?[[dx,0],[0,dy]]:[[0,dy],[dx,0]]; for(const [mx,my] of opts){if(mx||my){let nx=e.x+mx,ny=e.y+my;if(canEnter(nx,ny)&&!(nx==state.x&&ny==state.y)&&tile(nx,ny)!='D'){e.x=nx;e.y=ny;break}}}} if((e.x==state.x||e.y==state.y)&&Math.abs(e.x-state.x)+Math.abs(e.y-state.y)<7&&e.step%3==0)state.bolts.push({x:e.x,y:e.y,dx:Math.sign(state.x-e.x),dy:Math.sign(state.y-e.y)})}
 for(const b of state.bolts){b.x+=b.dx;b.y+=b.dy} state.bolts=state.bolts.filter(b=>tile(b.x,b.y)!='#'&&b.x>0&&b.y>0&&b.x<W-1&&b.y<H-1); for(const b of state.bolts){if(b.x==state.x&&b.y==state.y){if(state.equipped=='prism'&&has('prism')){b.dx*=-1;b.dy*=-1;msg('The prism reflects the bolt.')}else damage()}} for(const b of state.bolts){for(const e of es){if(b.x==e.x&&b.y==e.y){e.hp=0;b.dead=true}}} state.enemies[state.room]=es.filter(e=>e.hp>0); state.bolts=state.bolts.filter(b=>!b.dead)}
function enemyAtPlayer(){for(const e of state.enemies[state.room])if(e.x==state.x&&e.y==state.y)damage()}
function damage(){state.hp--; msg('Hit!'); if(state.hp<=0){msg('You collapse. The room reforms.'); state.hp=3; state.x=1; state.y=4; state.room='0,0'}}
function render(){el.map.innerHTML=''; el.actors.innerHTML=''; const r=room(); el.roomName.textContent='— '+r.name; el.status.textContent='♥'.repeat(state.hp)+'♡'.repeat(3-state.hp); const reveal=state.seenHidden[state.room]||has('lantern'); for(let y=0;y<H;y++)for(let x=0;x<W;x++){const d=document.createElement('div'); let ch=r.map[y][x], cls='floor', txt=''; if(ch=='#')cls='wall'; if(ch=='D'){cls='door';txt='▥'} if(ch=='v'){cls='vine';txt='♣'} if(ch=='c'){cls='crack';txt='░'} if(ch=='h'){cls=reveal?'floor':'hidden';txt=reveal?'·':''} if(ch=='a'){cls='anchor';txt='◎'} if(ch=='S'){cls='seal';txt='◆'} if(ch=='F'){cls='seal';txt='Ω'} d.className='tile '+cls; d.textContent=txt; el.map.appendChild(d)}
 for(const it of r.items)sprite(it.x,it.y,it.icon,'item'); for(const e of state.enemies[state.room])sprite(e.x,e.y,'♦','enemy'); for(const b of state.bolts)sprite(b.x,b.y,'•','bolt'); sprite(state.x,state.y,'☻','player'); el.inv.innerHTML=''; for(const id of state.inventory){const c=document.createElement('span');c.className='chip '+(id==state.equipped?'equipped':'');c.textContent=itemInfo[id].name;el.inv.appendChild(c)}}
function sprite(x,y,text,cls){const s=document.createElement('div');s.className='sprite '+cls;s.style.gridColumn=(x+1);s.style.gridRow=(y+1);s.textContent=text;el.actors.appendChild(s)}
function press(fn){return e=>{e.preventDefault(); const now=Date.now(); if(now-lastTap<80)return; lastTap=now; fn()}}
function bind(){const dirs={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}; document.querySelectorAll('[data-dir]').forEach(b=>{const d=dirs[b.dataset.dir]; b.addEventListener('pointerdown',press(()=>move(d[0],d[1])))}); document.getElementById('act').addEventListener('pointerdown',press(action)); document.getElementById('swap').addEventListener('pointerdown',press(swap)); document.getElementById('read').addEventListener('pointerdown',press(read)); document.getElementById('reset').addEventListener('pointerdown',press(reset)); document.getElementById('wait').addEventListener('pointerdown',press(()=>{tick();render()})); window.addEventListener('keydown',e=>{if(e.key=='ArrowUp'||e.key=='w')move(0,-1); if(e.key=='ArrowDown'||e.key=='s')move(0,1); if(e.key=='ArrowLeft'||e.key=='a')move(-1,0); if(e.key=='ArrowRight'||e.key=='d')move(1,0); if(e.key==' '||e.key=='Enter')action(); if(e.key=='e')swap(); if(e.key=='r')read()})}
bind(); reset();
})();
</script>
</body>
</html>
